<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ICU Smart CDSS</title>

<style>
body {
    font-family: Arial;
    background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center fixed;
    background-size: cover;
    padding: 20px;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.85);
    z-index: -1;
}

/* CONTAINER BIAR CENTER */
.container{
    max-width:1100px;
    margin:auto;
}

/* HEADER LOGO */
.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    margin-bottom:10px;
}

/* LOGO BIAR SAMA UKURAN */
.header img{
    height:70px;
    width:auto;
    max-width:150px;
    object-fit:contain;
}

/* JUDUL */
.banner{
    display:block;
    margin:0 auto 10px auto;

    width:90%;
    max-width:700px;

    height:auto;

    border-radius:20px;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{display:block;margin-top:8px;font-weight:bold;}
small{font-size:12px;color:#666;}
select,input{width:100%;padding:7px;margin-top:4px;}

button{
width:100%;padding:14px;margin-top:15px;
border:none;border-radius:10px;
font-size:16px;
}
.btn-primary{background:#0077b6;color:white;}
.btn-secondary{background:#adb5bd;color:white;}

.result{
margin-top:20px;padding:20px;
background:#edf6f9;border-radius:12px;
}

.normal{background:#d4edda;padding:8px;border-radius:8px;margin:5px;}
.warning{background:#fff3cd;padding:8px;border-radius:8px;margin:5px;}
.danger{background:#f8d7da;padding:8px;border-radius:8px;margin:5px;}
</style>
</head>

<body>
<div class="container">

<!-- HEADER LOGO (URUTAN SUDAH BENAR) -->
<div class="header-title">

    <img src="rs-unair-banner-1.png" class="banner">

</div>

<div class="header-title">
    <h1>ICU SMART CDSS</h1>
</div>

<div class="card">
<h3>👤 Identitas</h3>
<input id="nama" placeholder="Nama">
<input id="rm" placeholder="No RM">
</div>

<div class="grid">

<!-- MORSE -->
<div class="card">
<h3>⚠️ Morse Fall Scale</h3>

<label>Riwayat Jatuh (3 bulan terakhir)</label>
<select id="m1">
<option value="0">Tidak</option>
<option value="25">Ya</option>
</select>

<label>Diagnosis Sekunder (>1 diagnosis medis)</label>
<select id="m2">
<option value="0">Tidak</option>
<option value="15">Ya</option>
</select>

<label>Alat Bantu</label>
<select id="m3">
<option value="0">Tidak / Bedrest / Dibantu perawat</option>
<option value="15">Tongkat / Walker</option>
<option value="30">Berpegangan furniture</option>
</select>

<label>Terpasang IV / Infus</label>
<select id="m4">
<option value="0">Tidak</option>
<option value="20">Ya</option>
</select>

<label>Gaya Berjalan</label>
<select id="m5">
<option value="0">Normal / Bedrest / Kursi roda</option>
<option value="10">Lemah</option>
<option value="20">Terganggu / tidak stabil</option>
</select>

<label>Status Mental</label>
<select id="m6">
<option value="0">Sadar akan kemampuan</option>
<option value="15">Overestimate / lupa keterbatasan</option>
</select>

<button onclick="hitungMorse()">Hitung Morse</button>

<div id="hasilMorse" class="result"></div>
</div>

<script>
function hitungMorse(){

let m1 = +document.getElementById("m1").value;
let m2 = +document.getElementById("m2").value;
let m3 = +document.getElementById("m3").value;
let m4 = +document.getElementById("m4").value;
let m5 = +document.getElementById("m5").value;
let m6 = +document.getElementById("m6").value;

let total = m1 + m2 + m3 + m4 + m5 + m6;

let kategori = "";
let warna = "";
let interpretasi = "";
let rekomendasi = "";

// SDKI SLKI SIKI
let sdki = "";
let slki = "";
let siki = [];

// =====================
// INTERPRETASI MORSE
// =====================
if(total <= 24){
kategori = "Risiko Rendah";
warna = "normal";
interpretasi = "Risiko jatuh minimal";

// SDKI
sdki = "Tidak ada masalah keperawatan prioritas (risiko jatuh rendah)";

// SLKI
slki = `
• Status keselamatan pasien adekuat
• Tidak terjadi jatuh
`;

// SIKI
siki.push("Identifikasi risiko jatuh dasar");
siki.push("Edukasi pasien & keluarga");
siki.push("Pastikan lingkungan aman");

// rekomendasi umum
rekomendasi = `
• Perawatan standar
• Edukasi
`;

}

else if(total <= 44){
kategori = "Risiko Sedang";
warna = "warning";
interpretasi = "Risiko jatuh meningkat";

// SDKI
sdki = "Risiko Jatuh";

// SLKI
slki = `
• Tidak terjadi jatuh
• Kesadaran keselamatan meningkat
• Perilaku pencegahan jatuh meningkat
`;

// SIKI dasar
siki.push("Identifikasi faktor risiko jatuh");
siki.push("Edukasi pasien & keluarga");
siki.push("Pasang tanda risiko jatuh");
siki.push("Pastikan bel dalam jangkauan");
siki.push("Supervisi saat mobilisasi");

rekomendasi = `
• Label risiko jatuh
• Supervisi mobilisasi
`;

}

else{
kategori = "Risiko Tinggi";
warna = "danger";
interpretasi = "Risiko jatuh tinggi ⚠️";

// SDKI
sdki = "Risiko Jatuh";

// SLKI
slki = `
• Tidak terjadi jatuh
• Cedera tidak terjadi
• Keamanan pasien optimal
`;

// SIKI intensif
siki.push("Pengawasan ketat");
siki.push("Pasang side rail");
siki.push("Tempatkan pasien dekat nurse station");
siki.push("Bantuan penuh saat mobilisasi");
siki.push("Gunakan alas kaki anti-slip");
siki.push("Evaluasi risiko jatuh berkala");

rekomendasi = `
• 🚨 Pengawasan ketat
• Bed rail
`;

}

// =====================
// INTERVENSI TAMBAHAN BERDASARKAN FAKTOR
// =====================
let catatan = [];

if(m1 > 0){
catatan.push("Riwayat jatuh");
siki.push("Kaji ulang penyebab jatuh sebelumnya");
}

if(m2 > 0){
catatan.push("Diagnosis multipel");
siki.push("Koordinasi tim multidisiplin");
}

if(m3 >= 15){
catatan.push("Ketergantungan alat bantu");
siki.push("Pastikan alat bantu aman digunakan");
}

if(m4 > 0){
catatan.push("Terpasang infus");
siki.push("Amankan jalur infus saat mobilisasi");
}

if(m5 >= 10){
catatan.push("Gangguan berjalan");
siki.push("Latihan mobilisasi bertahap");
}

if(m6 > 0){
catatan.push("Gangguan persepsi diri");
siki.push("Orientasi realita secara berkala");
}

// =====================
// OUTPUT
// =====================
document.getElementById("hasilMorse").innerHTML = `

<div class="${warna}">
<h3>📊 HASIL MORSE</h3>
<b>Skor: ${total}</b><br>
Kategori: ${kategori}
</div>

<h4>📌 Interpretasi</h4>
${interpretasi}

<h4>🩺 SDKI (Masalah Keperawatan)</h4>
<b>${sdki}</b>

<h4>🎯 SLKI (Luaran)</h4>
<pre>${slki}</pre>

<h4>🛠️ SIKI (Intervensi)</h4>
<ul>${siki.map(x=>"<li>"+x+"</li>").join("")}</ul>

<h4>💊 Rekomendasi Umum</h4>
<pre>${rekomendasi}</pre>

<h4>🔍 Faktor Risiko Spesifik</h4>
<ul>${catatan.map(x=>"<li>"+x+"</li>").join("")}</ul>

`;

}
</script>
  
<!-- BRADEN -->
<div class="card">
<h3>🛏️ Skala Braden</h3>

<label>Persepsi Sensorik</label>
<select id="b1">
<option value="1">1 = Tidak respons</option>
<option value="2">2 = Sangat terbatas</option>
<option value="3">3 = Sedikit terbatas</option>
<option value="4">4 = Normal</option>
</select>

<label>Kelembaban</label>
<select id="b2">
<option value="1">1 = Selalu lembab</option>
<option value="2">2 = Sering lembab</option>
<option value="3">3 = Kadang lembab</option>
<option value="4">4 = Jarang lembab</option>
</select>

<label>Aktivitas</label>
<select id="b3">
<option value="1">1 = Bedrest</option>
<option value="2">2 = Kursi</option>
<option value="3">3 = Jalan terbatas</option>
<option value="4">4 = Sering berjalan</option>
</select>

<label>Mobilitas</label>
<select id="b4">
<option value="1">1 = Imobilisasi</option>
<option value="2">2 = Sangat terbatas</option>
<option value="3">3 = Sedikit terbatas</option>
<option value="4">4 = Bebas</option>
</select>

<label>Nutrisi</label>
<select id="b5">
<option value="1">1 = Sangat buruk</option>
<option value="2">2 = Kurang</option>
<option value="3">3 = Cukup</option>
<option value="4">4 = Baik</option>
</select>

<label>Gesekan & Geser</label>
<select id="b6">
<option value="1">1 = Masalah besar</option>
<option value="2">2 = Masalah potensial</option>
<option value="3">3 = Tidak ada masalah</option>
</select>

<button onclick="hitungBraden()">Hitung Braden</button>

<div id="hasilBraden" class="result"></div>
</div>

<script>
function hitungBraden(){

let b1 = +document.getElementById("b1").value;
let b2 = +document.getElementById("b2").value;
let b3 = +document.getElementById("b3").value;
let b4 = +document.getElementById("b4").value;
let b5 = +document.getElementById("b5").value;
let b6 = +document.getElementById("b6").value;

let total = b1 + b2 + b3 + b4 + b5 + b6;

let kategori, warna, rekomendasi;

// SDKI SLKI SIKI
let sdki = "";
let slki = "";
let siki = [];

// =====================
// INTERPRETASI BRADEN
// =====================
if(total <= 9){
kategori = "Sangat Tinggi";
warna = "danger";

// SDKI
sdki = "Risiko Kerusakan Integritas Kulit";

// SLKI
slki = `
• Integritas kulit terjaga
• Tidak terjadi luka tekan
• Perfusi jaringan adekuat
`;

// SIKI intensif
siki.push("Reposisi ≤ 2 jam");
siki.push("Gunakan kasur anti-dekubitus");
siki.push("Monitoring kulit tiap shift");
siki.push("Manajemen nutrisi tinggi protein");
siki.push("Jaga kulit tetap kering");

rekomendasi = "Intervensi intensif pencegahan dekubitus";

}

else if(total <= 12){
kategori = "Tinggi";
warna = "danger";

// SDKI
sdki = "Risiko Kerusakan Integritas Kulit";

// SLKI
slki = `
• Tidak terjadi luka tekan
• Kulit tetap utuh
`;

// SIKI
siki.push("Reposisi tiap 2 jam");
siki.push("Gunakan matras khusus");
siki.push("Observasi kulit harian");
siki.push("Jaga kelembaban kulit");

rekomendasi = "Pencegahan ketat dekubitus";

}

else if(total <= 16){
kategori = "Sedang";
warna = "warning";

// SDKI
sdki = "Risiko Kerusakan Integritas Kulit";

// SLKI
slki = `
• Risiko luka tekan menurun
• Integritas kulit terjaga
`;

// SIKI
siki.push("Reposisi 2–3 jam");
siki.push("Edukasi mobilisasi");
siki.push("Pantau area tekanan");

rekomendasi = "Pencegahan moderat";

}

else{
kategori = "Rendah";
warna = "normal";

// SDKI
sdki = "Tidak ada masalah prioritas (risiko rendah)";

// SLKI
slki = `
• Kulit tetap utuh
• Tidak terjadi luka tekan
`;

// SIKI
siki.push("Mobilisasi rutin");
siki.push("Perawatan kulit dasar");

rekomendasi = "Perawatan standar";

}

// =====================
// ANALISIS FAKTOR RISIKO
// =====================
let catatan = [];

if(b1 <= 2){
catatan.push("Gangguan sensorik");
siki.push("Kaji respon nyeri/tekanan");
}

if(b2 <= 2){
catatan.push("Kulit lembab");
siki.push("Manajemen inkontinensia");
siki.push("Ganti linen secara berkala");
}

if(b3 <= 2){
catatan.push("Aktivitas rendah");
siki.push("Latihan mobilisasi bertahap");
}

if(b4 <= 2){
catatan.push("Mobilitas terbatas");
siki.push("Bantu perubahan posisi");
}

if(b5 <= 2){
catatan.push("Nutrisi buruk");
siki.push("Kolaborasi ahli gizi");
siki.push("Monitoring intake nutrisi");
}

if(b6 <= 2){
catatan.push("Gesekan tinggi");
siki.push("Gunakan alat bantu transfer");
siki.push("Hindari gesekan saat reposisi");
}

// =====================
// OUTPUT
// =====================
document.getElementById("hasilBraden").innerHTML = `

<div class="${warna}">
<h3>📊 HASIL BRADEN</h3>
<b>Skor: ${total}</b><br>
Kategori: ${kategori}
</div>

<h4>📌 Interpretasi</h4>
Risiko dekubitus: <b>${kategori}</b>

<h4>🩺 SDKI (Masalah Keperawatan)</h4>
<b>${sdki}</b>

<h4>🎯 SLKI (Luaran)</h4>
<pre>${slki}</pre>

<h4>🛠️ SIKI (Intervensi)</h4>
<ul>${[...new Set(siki)].map(x=>"<li>"+x+"</li>").join("")}</ul>

<h4>💊 Rekomendasi Umum</h4>
${rekomendasi}

<h4>🔍 Faktor Risiko Spesifik</h4>
<ul>${catatan.map(x=>"<li>"+x+"</li>").join("")}</ul>

`;

}
</script>

<!-- RASS -->
<div class="card">
<h3>🧠 RASS (Richmond Agitation-Sedation Scale)</h3>

<label>Pilih Skor RASS</label>
<select id="rass">
<option value="-5">-5 = Tidak respons (tidak ada respon terhadap suara/nyeri)</option>
<option value="-4">-4 = Sedasi dalam (respon minimal terhadap nyeri)</option>
<option value="-3">-3 = Sedasi sedang (respon terhadap suara tanpa kontak mata)</option>
<option value="-2">-2 = Sedasi ringan (kontak mata singkat)</option>
<option value="-1">-1 = Mengantuk (kontak mata >10 detik)</option>
<option value="0">0 = Sadar & tenang</option>
<option value="1">+1 = Gelisah</option>
<option value="2">+2 = Agitasi</option>
<option value="3">+3 = Agitasi berat</option>
<option value="4">+4 = Sangat agitasi / agresif</option>
</select>

<button onclick="hitungRASS()">Hitung RASS</button>

<div id="hasilRASS" class="result"></div>
</div>

<script>
function hitungRASS(){

let nilai = parseInt(document.getElementById("rass").value);

let kategori = "";
let warna = "";
let interpretasi = "";
let rekomendasi = "";

// INTERPRETASI KLINIS
if(nilai <= -4){
kategori = "Sedasi sangat dalam";
warna = "danger";
interpretasi = "Pasien tidak respons / hampir tidak respons";
rekomendasi = "⚠️ Evaluasi overdosis sedasi, pertimbangkan pengurangan sedatif, monitor airway & hemodinamik ketat";
}

else if(nilai == -3){
kategori = "Sedasi sedang";
warna = "warning";
interpretasi = "Respon minimal terhadap suara";
rekomendasi = "Evaluasi target sedasi, pertimbangkan titrasi sedatif";
}

else if(nilai == -2){
kategori = "Sedasi ringan";
warna = "normal";
interpretasi = "Kontak mata singkat, masih sesuai target ICU";
rekomendasi = "Pertahankan terapi, monitor berkala";
}

else if(nilai == -1){
kategori = "Mengantuk";
warna = "normal";
interpretasi = "Pasien mengantuk namun respons baik";
rekomendasi = "Masih dalam target, observasi";
}

else if(nilai == 0){
kategori = "Sadar & tenang";
warna = "normal";
interpretasi = "Kondisi ideal pasien ICU";
rekomendasi = "Pertahankan kondisi, lanjutkan monitoring";
}

else if(nilai == 1){
kategori = "Gelisah";
warna = "warning";
interpretasi = "Pasien tampak cemas / tidak tenang";
rekomendasi = "Evaluasi nyeri, hipoksia, delirium";
}

else if(nilai == 2){
kategori = "Agitasi";
warna = "danger";
interpretasi = "Gerakan sering, melawan ventilator";
rekomendasi = "⚠️ Evaluasi nyeri, sedasi, hipoksia; pertimbangkan sedatif";
}

else if(nilai >= 3){
kategori = "Agitasi berat";
warna = "danger";
interpretasi = "Perilaku berbahaya / agresif";
rekomendasi = "⚠️ Sedasi segera, amankan pasien, evaluasi penyebab (hipoksia, delirium)";
}

// TARGET ICU
let target = (nilai >= -2 && nilai <= 0) 
? "✅ Dalam target sedasi ICU (-2 sampai 0)" 
: "⚠️ Di luar target sedasi ICU";

// OUTPUT
document.getElementById("hasilRASS").innerHTML = `
<div class="${warna}">
<h3>📊 HASIL RASS</h3>
<b>Skor: ${nilai}</b><br>
Kategori: ${kategori}
</div>

<h4>📌 Interpretasi</h4>
${interpretasi}

<h4>🎯 Target ICU</h4>
${target}

<h4>💊 Rekomendasi</h4>
${rekomendasi}
`;

}
</script>

<!-- BPS -->
<div class="card">
<h3>💢 BPS (Behavioral Pain Scale)</h3>

<label>Ekspresi Wajah</label>
<select id="bps1">
<option value="1">1 = Relaks</option>
<option value="2">2 = Tegang</option>
<option value="3">3 = Grimace (mengerut)</option>
<option value="4">4 = Meringis jelas</option>
</select>

<label>Gerakan Ekstremitas Atas</label>
<select id="bps2">
<option value="1">1 = Tidak ada gerakan</option>
<option value="2">2 = Fleksi ringan</option>
<option value="3">3 = Fleksi kuat / menarik</option>
<option value="4">4 = Tarikan kuat / melawan</option>
</select>

<label>Adaptasi Ventilator / Respons terhadap Ventilator</label>
<select id="bps3">
<option value="1">1 = Toleransi ventilator</option>
<option value="2">2 = Batuk ringan</option>
<option value="3">3 = Melawan ventilator</option>
<option value="4">4 = Tidak sinkron ventilator</option>
</select>

<button onclick="hitungBPS()">Hitung BPS</button>

<div id="hasilBPS" class="result"></div>
</div>

<script>
function hitungBPS(){

let p1 = +document.getElementById("bps1").value;
let p2 = +document.getElementById("bps2").value;
let p3 = +document.getElementById("bps3").value;

let total = p1 + p2 + p3;

let kategori = "";
let warna = "";
let interpretasi = "";
let rekomendasi = "";

// INTERPRETASI KLINIS
if(total <= 4){
kategori = "Tidak nyeri";
warna = "normal";
interpretasi = "Pasien tampak nyaman, tidak ada tanda nyeri bermakna";
rekomendasi = "Lanjutkan monitoring rutin, pertahankan terapi saat ini";
}

else if(total <= 6){
kategori = "Nyeri ringan";
warna = "warning";
interpretasi = "Terdapat tanda nyeri ringan";
rekomendasi = "Evaluasi kebutuhan analgesik, optimalkan kenyamanan pasien";
}

else if(total <= 8){
kategori = "Nyeri sedang";
warna = "danger";
interpretasi = "Nyeri signifikan, dapat mempengaruhi ventilasi dan hemodinamik";
rekomendasi = "⚠️ Berikan analgesik (opioid/non-opioid sesuai indikasi), evaluasi penyebab nyeri";
}

else{
kategori = "Nyeri berat";
warna = "danger";
interpretasi = "Nyeri berat, risiko instabilitas pasien";
rekomendasi = "🚨 Analgesia segera, evaluasi penyebab (prosedur, ventilator, luka), pertimbangkan sedasi tambahan";
}

// TARGET ICU
let target = (total <= 5)
? "✅ Nyeri terkontrol (target ICU)"
: "⚠️ Nyeri belum terkontrol";

// ANALISIS DETAIL
let catatan = [];

if(p1 >= 3) catatan.push("Ekspresi wajah menunjukkan nyeri");
if(p2 >= 3) catatan.push("Gerakan ekstremitas menunjukkan respon nyeri");
if(p3 >= 3) catatan.push("Tidak sinkron dengan ventilator");

// OUTPUT
document.getElementById("hasilBPS").innerHTML = `
<div class="${warna}">
<h3>📊 HASIL BPS</h3>
<b>Skor: ${total}</b><br>
Kategori: ${kategori}
</div>

<h4>📌 Interpretasi</h4>
${interpretasi}

<h4>🎯 Target ICU</h4>
${target}

<h4>💊 Rekomendasi</h4>
${rekomendasi}

<h4>🔍 Analisis Faktor</h4>
<ul>${catatan.map(x=>"<li>"+x+"</li>").join("")}</ul>
`;

}
</script>

<!-- VAS NYERI -->
<div class="card">
<h3>😖 Skala Nyeri VAS (0–10)</h3>

<label>Skor Nyeri (0 = tidak nyeri, 10 = sangat nyeri)</label>
<input type="range" id="vas" min="0" max="10" value="0" oninput="updateVAS()">

<div id="vasValue" style="font-size:20px; margin-top:10px;">0 😄</div>

<button onclick="hitungVAS()">Analisis Nyeri</button>

<div id="hasilVAS" class="result"></div>
</div>

<script>
// UPDATE EMOJI REALTIME
function updateVAS(){
let vas = document.getElementById("vas").value;
let emoji = "";

if(vas == 0) emoji = "😄";
else if(vas <= 3) emoji = "🙂";
else if(vas <= 6) emoji = "😐";
else if(vas <= 8) emoji = "😣";
else emoji = "😭";

document.getElementById("vasValue").innerHTML = vas + " " + emoji;
}

// ANALISIS VAS
function hitungVAS(){

let vas = +document.getElementById("vas").value;

let kategori = "";
let warna = "";
let interpretasi = "";
let sdki = "";
let slki = "";
let siki = [];

// =====================
// INTERPRETASI VAS
// =====================
if(vas == 0){
kategori = "Tidak Nyeri";
warna = "normal";

sdki = "Tidak ada masalah nyeri";

slki = `
• Pasien bebas nyeri
• Kenyamanan optimal
`;

siki.push("Observasi kondisi umum");
siki.push("Pertahankan kenyamanan");

interpretasi = "Pasien tidak merasakan nyeri";

}

else if(vas <= 3){
kategori = "Nyeri Ringan";
warna = "normal";

sdki = "Nyeri Akut";

slki = `
• Intensitas nyeri menurun
• Pasien tampak nyaman
`;

siki.push("Kaji karakteristik nyeri");
siki.push("Ajarkan teknik relaksasi");
siki.push("Distraksi (musik, TV)");
siki.push("Posisi nyaman");

interpretasi = "Nyeri ringan, masih dapat ditoleransi";

}

else if(vas <= 6){
kategori = "Nyeri Sedang";
warna = "warning";

sdki = "Nyeri Akut";

slki = `
• Skala nyeri menurun
• Ekspresi nyeri berkurang
`;

siki.push("Monitoring skala nyeri berkala");
siki.push("Berikan teknik non-farmakologi");
siki.push("Kolaborasi analgesik ringan-sedang");
siki.push("Ciptakan lingkungan nyaman");

interpretasi = "Nyeri mulai mengganggu aktivitas";

}

else{
kategori = "Nyeri Berat";
warna = "danger";

sdki = "Nyeri Akut";

slki = `
• Nyeri terkontrol
• Tanda vital stabil
• Pasien lebih nyaman
`;

siki.push("Kaji nyeri komprehensif (lokasi, durasi, kualitas)");
siki.push("Kolaborasi analgesik kuat");
siki.push("Monitoring efek terapi");
siki.push("Posisi terapeutik");
siki.push("Dukungan emosional");

interpretasi = "Nyeri berat, memerlukan penanganan segera";

}

// =====================
// OUTPUT
// =====================
document.getElementById("hasilVAS").innerHTML = `

<div class="${warna}">
<h3>📊 HASIL SKALA NYERI</h3>
<b>Skor: ${vas}</b><br>
Kategori: ${kategori}
</div>

<h4>📌 Interpretasi</h4>
${interpretasi}

<h4>🩺 SDKI (Masalah Keperawatan)</h4>
<b>${sdki}</b>

<h4>🎯 SLKI (Luaran)</h4>
<pre>${slki}</pre>

<h4>🛠️ SIKI (Intervensi)</h4>
<ul>${siki.map(x=>"<li>"+x+"</li>").join("")}</ul>

`;

}
</script>

<!-- APACHE -->
<div class="card">
<h3>📊 APACHE II (Full Clinical)</h3>

<input id="temp" type="number" placeholder="Suhu (°C)">
<input id="map" type="number" placeholder="MAP (mmHg)">
<input id="hr" type="number" placeholder="Heart Rate">
<input id="rr" type="number" placeholder="Respiratory Rate">
<input id="fio2" type="number" placeholder="FiO2 (contoh 0.5)">
<input id="pao2" type="number" placeholder="PaO2 (mmHg)">
<input id="ph" type="number" placeholder="pH">
<input id="na" type="number" placeholder="Na">
<input id="k" type="number" placeholder="K">
<input id="cr" type="number" placeholder="Kreatinin">
<input id="hct" type="number" placeholder="Hematokrit">
<input id="wbc" type="number" placeholder="Leukosit">
<input id="gcs" type="number" placeholder="GCS (3–15)">
<input id="age" type="number" placeholder="Usia">

<select id="chronic">
<option value="0">Tidak ada</option>
<option value="5">Non-operatif / operasi elektif</option>
<option value="10">Operasi emergensi / syok</option>
</select>

<button onclick="hitungAPACHE()">Hitung APACHE II</button>

<div id="hasilAPACHE" class="result"></div>
</div>

<script>

// =====================
// SCORING FUNCTIONS
// =====================
function scoreTemp(t){
if(t>=41) return 4;
if(t>=39) return 3;
if(t>=38.5) return 1;
if(t>=36) return 0;
if(t>=34) return 1;
if(t>=32) return 2;
if(t>=30) return 3;
return 4;
}

function scoreMAP(m){
if(m>=160) return 4;
if(m>=130) return 3;
if(m>=110) return 2;
if(m>=70) return 0;
if(m>=50) return 2;
return 4;
}

function scoreHR(hr){
if(hr>=180) return 4;
if(hr>=140) return 3;
if(hr>=110) return 2;
if(hr>=70) return 0;
if(hr>=55) return 2;
if(hr>=40) return 3;
return 4;
}

function scoreRR(rr){
if(rr>=50) return 4;
if(rr>=35) return 3;
if(rr>=25) return 1;
if(rr>=12) return 0;
if(rr>=10) return 1;
if(rr>=6) return 2;
return 4;
}

function scoreOxygen(pao2, fio2){
let ratio = pao2 / fio2;
if(ratio >= 400) return 0;
if(ratio >= 300) return 1;
if(ratio >= 200) return 3;
return 4;
}

function scorePH(ph){
if(ph>=7.7) return 4;
if(ph>=7.6) return 3;
if(ph>=7.5) return 1;
if(ph>=7.33) return 0;
if(ph>=7.25) return 2;
if(ph>=7.15) return 3;
return 4;
}

function scoreNa(na){
if(na>=180) return 4;
if(na>=160) return 3;
if(na>=155) return 2;
if(na>=150) return 1;
if(na>=130) return 0;
if(na>=120) return 2;
if(na>=111) return 3;
return 4;
}

function scoreK(k){
if(k>=7) return 4;
if(k>=6) return 3;
if(k>=5.5) return 1;
if(k>=3.5) return 0;
if(k>=3) return 1;
if(k>=2.5) return 2;
return 4;
}

function scoreCr(cr){
if(cr>=3.5) return 4;
if(cr>=2) return 3;
if(cr>=1.5) return 2;
if(cr>=0.6) return 0;
return 2;
}

function scoreHct(h){
if(h>=60) return 4;
if(h>=50) return 2;
if(h>=46) return 1;
if(h>=30) return 0;
if(h>=20) return 2;
return 4;
}

function scoreWBC(w){
if(w>=40) return 4;
if(w>=20) return 2;
if(w>=15) return 1;
if(w>=3) return 0;
if(w>=1) return 2;
return 4;
}

function scoreAge(age){
if(age>=75) return 6;
if(age>=65) return 5;
if(age>=55) return 3;
if(age>=45) return 2;
return 0;
}

// =====================
// HITUNG APACHE
// =====================
function hitungAPACHE(){

let score =
scoreTemp(+temp.value) +
scoreMAP(+map.value) +
scoreHR(+hr.value) +
scoreRR(+rr.value) +
scoreOxygen(+pao2.value, +fio2.value) +
scorePH(+ph.value) +
scoreNa(+na.value) +
scoreK(+k.value) +
scoreCr(+cr.value) +
scoreHct(+hct.value) +
scoreWBC(+wbc.value) +
(15 - gcs.value) +
scoreAge(+age.value) +
+document.getElementById("chronic").value;

// =====================
// INTERPRETASI
// =====================
let mortalitas, warna, rekomendasi;

if(score < 10){
mortalitas = "<10%";
warna = "normal";
rekomendasi = "Monitoring rutin";
}
else if(score < 20){
mortalitas = "10–25%";
warna = "warning";
rekomendasi = "Observasi ketat, optimalkan terapi";
}
else if(score < 30){
mortalitas = "40–55%";
warna = "danger";
rekomendasi = "⚠️ ICU intensif, ventilasi, vasopressor bila perlu";
}
else{
mortalitas = ">75%";
warna = "danger";
rekomendasi = "🚨 Kondisi kritis, resusitasi agresif";
}

// OUTPUT
document.getElementById("hasilAPACHE").innerHTML = `
<div class="${warna}">
<h3>📊 HASIL APACHE II</h3>
<b>Skor: ${score}</b><br>
Mortalitas: ${mortalitas}
</div>

<h4>📌 Interpretasi</h4>
Semakin tinggi skor → semakin tinggi risiko kematian

<h4>💊 Rekomendasi</h4>
${rekomendasi}
`;

}
</script>

  <!-- ESTIMASI BB -->
<div class="card">
<h3>⚖️ Estimasi Berat Badan (Model Chumlea)</h3>

<label>Usia (tahun)</label>
<input id="usia" type="number" placeholder="Contoh: 45">

<label>Tinggi Lutut / Knee Height (cm)</label>
<input id="knee" type="number" placeholder="Contoh: 50">

<label>Lingkar Lengan Atas / MUAC (cm)</label>
<input id="muac" type="number" placeholder="Contoh: 25">

<label>Jenis Kelamin</label>
<select id="gender">
<option value="pria">Pria</option>
<option value="wanita">Wanita</option>
</select>

<button onclick="hitungChumlea()">Hitung BB (Chumlea)</button>

<div id="hasilChumlea" class="result"></div>
</div>

<script>
function hitungChumlea(){

let usia = parseFloat(document.getElementById("usia").value);
let knee = parseFloat(document.getElementById("knee").value);
let muac = parseFloat(document.getElementById("muac").value);
let gender = document.getElementById("gender").value;

if(!usia || !knee || !muac){
document.getElementById("hasilChumlea").innerHTML = "⚠️ Lengkapi semua data";
return;
}

// ==========================
// RUMUS CHUMLEA (APPROX ICU)
// ==========================
let tb = 0;
let bb = 0;

// Estimasi tinggi badan
if(gender === "pria"){
tb = (2.02 * knee) - (0.04 * usia) + 64.19;
bb = (1.1 * muac) + (0.3 * knee) - 20;
}else{
tb = (1.83 * knee) - (0.24 * usia) + 84.88;
bb = (1.0 * muac) + (0.25 * knee) - 18;
}

tb = Math.round(tb);
bb = Math.round(bb);

// ==========================
// INTERPRETASI KLINIS
// ==========================
let diagnosis = "";
let warna = "";
let intervensi = "";
let luaran = "";

// klasifikasi MUAC
if(muac < 23){
diagnosis = "Gangguan Nutrisi: Kurang dari kebutuhan tubuh";
warna = "danger";

luaran = `
Status nutrisi membaik (SLKI):
- Berat badan meningkat
- Asupan nutrisi adekuat
- Tidak ada tanda malnutrisi
`;

intervensi = `
Intervensi (SIKI):
- Manajemen Nutrisi
- Monitor intake-output
- Kolaborasi pemberian nutrisi enteral/parenteral
- Edukasi kebutuhan kalori
`;
}
else if(muac <= 32){
diagnosis = "Status nutrisi dalam batas normal";
warna = "normal";

luaran = `
Status nutrisi stabil (SLKI):
- BB stabil
- Intake adekuat
`;

intervensi = `
Intervensi (SIKI):
- Monitoring nutrisi rutin
- Pertahankan diet sesuai kebutuhan
`;
}
else{
diagnosis = "Risiko Ketidakseimbangan Nutrisi: Lebih dari kebutuhan";
warna = "warning";

luaran = `
Status metabolik terkontrol (SLKI):
- BB terkendali
- Tidak ada komplikasi metabolik
`;

intervensi = `
Intervensi (SIKI):
- Manajemen berat badan
- Edukasi diet
- Monitor gula darah & lipid
`;
}

// ==========================
// OUTPUT
// ==========================
document.getElementById("hasilChumlea").innerHTML = `
<div class="${warna}">
<h3>📊 HASIL CHUMLEA</h3>
<b>Estimasi BB: ${bb} kg</b><br>
Estimasi TB: ${tb} cm<br>
Diagnosis: ${diagnosis}
</div>

<h4>📌 Interpretasi</h4>
Perhitungan menggunakan metode Chumlea (digunakan pada pasien immobilisasi/ICU)

<h4>🩺 SDKI</h4>
${diagnosis}

<h4>🎯 SLKI (Luaran)</h4>
${luaran}

<h4>💊 SIKI (Intervensi)</h4>
${intervensi}

<h4>📏 Data Input</h4>
Usia: ${usia} th<br>
MUAC: ${muac} cm<br>
Knee Height: ${knee} cm
`;
}
</script>

<div class="card">
<h3>🍽️ Kebutuhan Kalori Harian</h3>

<label>Berat Badan (kg)</label>
<input id="bb" type="number" placeholder="Contoh: 60">

<label>Kondisi Klinis</label>
<select id="kondisi">
<option value="25">Normal (rawat inap biasa)</option>
<option value="30">Stres ringan (post op, infeksi ringan)</option>
<option value="35">Stres sedang (sepsis, trauma)</option>
<option value="40">Stres berat (ICU, ventilator, luka bakar)</option>
</select>

<label>Status Nutrisi</label>
<select id="status">
<option value="1">Normal</option>
<option value="0.9">Overweight / obesitas</option>
<option value="1.1">Malnutrisi</option>
</select>

<button onclick="hitungKalori()">Hitung Kebutuhan</button>

<div id="hasilKalori" class="result"></div>
</div>

<script>
function hitungKalori(){

let bb = parseFloat(document.getElementById("bb").value);
let faktor = parseFloat(document.getElementById("kondisi").value);
let status = parseFloat(document.getElementById("status").value);

if(!bb){
document.getElementById("hasilKalori").innerHTML = "⚠️ Masukkan berat badan";
return;
}

// HITUNG TOTAL KALORI
let kalori = bb * faktor * status;
kalori = Math.round(kalori);

// PROTEIN (standar ICU)
let protein = Math.round(bb * 1.2);

// INTERPRETASI
let kategori = "";
let warna = "";
let rekomendasi = "";

if(kalori < 1500){
kategori = "Kebutuhan rendah";
warna = "warning";
rekomendasi = "Evaluasi status nutrisi, pertimbangkan peningkatan intake";
}
else if(kalori <= 2500){
kategori = "Kebutuhan sedang";
warna = "normal";
rekomendasi = "Pertahankan nutrisi sesuai kebutuhan";
}
else{
kategori = "Kebutuhan tinggi";
warna = "danger";
rekomendasi = "⚠️ Monitor ketat, pertimbangkan nutrisi enteral/parenteral";
}

// OUTPUT
document.getElementById("hasilKalori").innerHTML = `
<div class="${warna}">
<h3>📊 HASIL KEBUTUHAN KALORI</h3>
<b>Total: ${kalori} kkal/hari</b><br>
Protein: ${protein} gram/hari<br>
Kategori: ${kategori}
</div>

<h4>📌 Interpretasi</h4>
Kebutuhan dihitung berdasarkan berat badan dan tingkat stres metabolik

<h4>💊 Rekomendasi</h4>
${rekomendasi}

<h4>🥗 Catatan Klinis</h4>
• Karbohidrat: 50–60%  
• Lemak: 20–30%  
• Protein: 1.2–2 g/kg (ICU bisa lebih tinggi)
`;
}
</script>
